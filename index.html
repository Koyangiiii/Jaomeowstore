<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JaoMeow Store - Google Sheet Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: {
          light: '#FFF0F5', // ชมพูอ่อนพาสเทล
          base: '#FFB6C1',  // ชมพูสดใสสไตล์ JaoMeow
          dark: '#462B21',  // น้ำตาลเข้มคงเดิมเพื่อความชัดเจนของตัวอักษร
          accent: '#FFE4E1', // ชมพูไฮไลท์
          white: 'rgba(255, 255, 255, 0.85)'
        }
      }
    }
  }
}
</script>
<style>
/* =========================================
บังคับฟอนต์ไม่ให้ใช้ของ iPhone เด็ดขาด
========================================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
/* ใช้ Mitr เป็นฟอนต์หลักของทุก Element */
html, body, div, span, applet, object, iframe, h1, h2, h3, h4, h5, h6, p, blockquote, pre, a,
abbr, acronym, address, big, cite, code, del, dfn, em, img, ins, kbd, q, s, samp, small, strike,
strong, sub, sup, tt, var, b, u, i, center, dl, dt, dd, ol, ul, li, fieldset, form, label, legend, table,
caption, tbody, textad, th, td, article, aside, canvas, details, embed, figure, figcaption,
footer, header, hgroup, menu, nav, output, ruby, section, summary, time, mark, audio, video,
button, input, textarea, select {
  font-family: 'Mitr', sans-serif !important;
  color: #462B21; /* brand-dark */
}
/* ใช้ Fredoka เฉพาะคลาสที่กำหนด */
.font-eng {
  font-family: 'Fredoka', sans-serif !important;
}
.font-eng * {
  font-family: 'Fredoka', sans-serif !important;
}
/* =========================================
ดีไซน์ใหม่: Glassmorphism & Mesh Gradient (โทนชมพู)
========================================= */
body {
  background-color: #FFF0F5;
  background-image:
    radial-gradient(at 10% 0%, #FFE4E1 0px, transparent 50%),
    radial-gradient(at 90% 10%, #FFB6C1 0px, transparent 50%),
    radial-gradient(at 50% 90%, #FFF5EE 0px, transparent 50%);
  background-attachment: fixed;
  min-height: 100vh;
  overflow-x: hidden;
}
/* ซ่อน Scrollbar */
::-webkit-scrollbar { width: 0px; background: transparent; }
.container-box {
  max-width: 500px;
  margin: 0 auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
/* กล่องสไตล์ Bento / Glass */
.bento-card {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.9);
  border-radius: 1.5rem;
  padding: 1.5rem;
  box-shadow: 0 4px 30px rgba(255, 182, 193, 0.2);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
/* เมนูแบบ Pill ด้านบน */
.floating-nav {
  position: sticky;
  top: 1rem;
  z-index: 50;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 999px;
  padding: 0.5rem 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 20px rgba(70, 43, 33, 0.08);
  margin-bottom: 1rem;
}
/* Tab Styles */
.tab-btn.active {
  background-color: #FFB6C1 !important;
  color: #462B21 !important;
  font-weight: 500;
}
.work-link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 1rem;
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid #FFE4E1;
  border-radius: 1rem;
  margin-bottom: 0.5rem;
  text-decoration: none;
  transition: all 0.2s;
}
.work-link:active {
  transform: scale(0.98);
  background: #FFE4E1;
}
</style>
</head>
<body>
<div class="container-box">
  <nav class="floating-nav">
    <span class="font-eng font-semibold text-lg text-brand-dark tracking-wide pl-2">JaoMeow</span>
    <div class="flex gap-2 font-eng text-sm">
      <a href="#work" class="px-3 py-1.5 rounded-full hover:bg-brand-accent/50 transition font-medium">Guide</a>
      <a href="#price" class="px-3 py-1.5 rounded-full hover:bg-brand-accent/50 transition font-medium">Notice</a>
      <a href="#contact" class="px-3 py-1.5 bg-brand-base text-brand-dark rounded-full font-medium">Contact</a>
    </div>
  </nav>

  <!-- [คงไว้ 100%] ส่วน Badges (ปุ่มกลมเล็กๆ ด้านบน) -->
  <div class="flex justify-center gap-2 mb-1">
    <span class="bg-white/80 border border-brand-base text-brand-dark text-[11px] px-3 py-1 rounded-full shadow-sm font-medium">🌸 สดใส</span>
    <span class="bg-white/80 border border-brand-base text-brand-dark text-[11px] px-3 py-1 rounded-full shadow-sm font-medium">⭐ Google Sheet</span>
    <span class="bg-white/80 border border-brand-base text-brand-dark text-[11px] px-3 py-1 rounded-full shadow-sm font-medium">💖 ใช้งานง่าย</span>
  </div>

  <!-- [คงไว้ 100%] Status Bar (แถบเช็คคิวงาน) และ ปุ่มเช็คคิวงานแบบเส้นประ -->
  <div class="bento-card p-4 flex flex-col gap-3">
    <div class="flex justify-between items-center text-xs">
      <span class="flex items-center gap-1.5 font-medium">
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> สถานะระบบคิวงาน
      </span>
      <span class="text-brand-dark/60 font-eng">Update Today</span>
    </div>
    <div class="w-full bg-brand-light rounded-full h-2.5 overflow-hidden border border-brand-accent">
      <div class="bg-brand-base h-2.5 rounded-full" style="width: 100%"></div>
    </div>
    <a href="#contact" class="border-2 border-dashed border-brand-base/70 rounded-xl p-2.5 text-center text-xs font-medium bg-white/40 hover:bg-white/70 transition block">
      🔍 คลิกที่นี่เพื่อติดต่อสอบถามคิวงาน / ทักแชทสอบถาม
    </a>
  </div>

  <!-- [คงไว้ 100%] โครงสร้าง header ทั้งหมด (ส่วนชื่อร้าน) -->
  <header class="bento-card text-center relative overflow-hidden">
    <svg class="absolute -top-10 -right-10 text-brand-accent/40 w-40 h-40 rotate-12" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
    <div class="relative z-10">
      <div class="w-24 h-24 mx-auto mb-4 rounded-full overflow-hidden border-[3px] border-white shadow-sm bg-brand-accent/30 flex items-center justify-center">
        <img src="logo.png" alt="JaoMeow Logo" class="w-full h-full object-cover">
      </div>
      
      <h1 class="font-eng text-[2.5rem] leading-[1.1] font-bold text-brand-dark mb-1 tracking-tight">JaoMeow</h1>
      <p class="font-eng text-xl text-brand-base font-semibold mb-4 tracking-widest uppercase">Store</p>
      <p class="text-sm leading-relaxed text-brand-dark/80 max-w-[340px] mx-auto">
        สำหรับลูกค้าที่สั่งไฟล์ Google Sheet<br>กับทางร้านเท่านั้นนะคะ 🎀
      </p>
    </div>
  </header>

  <footer class="text-center text-[10px] text-brand-dark/50 font-eng pb-6">
    &copy; 2026 JaoMeow Store.
  </footer>
</div>

<script>
function switchTab(tabId) {
  document.getElementById('tab-bright').classList.add('hidden');
  document.getElementById('tab-dark').classList.add('hidden');
  document.getElementById('tab-pastel').classList.add('hidden');
  
  document.getElementById('btn-bright').classList.remove('active');
  document.getElementById('btn-dark').classList.remove('active');
  document.getElementById('btn-pastel').classList.remove('active');
  
  document.getElementById('tab-' + tabId).classList.remove('hidden');
  document.getElementById('btn-' + tabId).classList.add('active');
}
</script>
</body>
</html>
